services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # SQLite database — named volume for persistence
      - db-data:/data
      # Video storage — bind-mount from host SSD
      - ${VIDEO_STORAGE_PATH:-/mnt/ssd/videos}:/mnt/ssd/videos
      # SD card watch path — exposes host mount points inside container
      - ${SD_CARD_WATCH_PATH:-/media}:/media
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
